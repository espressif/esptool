.target_test:
  image: $PYTHON_IMAGE_MIN
  stage: test
  tags: [host_test]
  variables:
    PYTHONPATH: "$PYTHONPATH:${CI_PROJECT_DIR}/test"
    COVERAGE_PROCESS_START: "${CI_PROJECT_DIR}/test/.covconf"
    TOOL: "test_esptool.py"
    EXTRA_ARGS: ""
  before_script:
    - pip install -e .[dev] --prefer-binary
    # libffi (needed for espsecure) version keeps changing in python docker images. Add a symlink to the installed version on Raspberry Pi
    - if [ $(uname -m) = "armv7l" ]; then ln -sfn /usr/lib/arm-linux-gnueabihf/libffi.so.7.1.0 /usr/lib/arm-linux-gnueabihf/libffi.so.6; fi
  script:
    - coverage run --parallel-mode -m pytest ${CI_PROJECT_DIR}/test/${TOOL} --port /dev/serial_ports/${PORT} ${EXTRA_ARGS} --chip ${TARGET} --baud 115200 -m "not host_test"
  artifacts:
    reports:
      junit: test/report.xml
    when: always
    paths:
      - test/*.out
      - "**/.coverage*"
      - ".coverage*"
    expire_in: 1 week

target_esp8266:
  extends: .target_test
  variables:
    PORT: esp8266
    TARGET: esp8266
  tags: [esptool-esp8266]

