---
# GitLab CI — see .gitlab/README.md
#
# Note: When updating, please also update test_esptool.yml GH Actions workflow file
stages:
  - canary_prep
  - pre-check
  - check
  - test
  - report
  - build_docs
  - deploy_docs
  - deploy_development_package
  - canary_post
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS && $CI_PIPELINE_SOURCE == "push"
      when: never
    # Nightly canary schedule — see .gitlab/README.md
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_COMMIT_BRANCH

include:
  # Danger MR linter, isolated so it can be skipped on bot/sync-master via
  # include:rules. See .gitlab/README.md (Sync to internal) for why.
  - local: /.gitlab/danger.yml
    rules:
      - if: $CI_COMMIT_REF_NAME != "bot/sync-master"
  - local: /.gitlab/checks.yml
  - local: /.gitlab/host_tests.yml
  - local: /.gitlab/target_tests.yml
  - local: /.gitlab/deploy_docs.yml
  - local: /.gitlab/canary.yml
  - local: /.gitlab/internal_release.yml
  - local: /.gitlab/sync_to_internal.yml
# cache the pip download directory in all jobs
variables:
  PIP_CACHE_DIR: $CI_PROJECT_DIR/.cache/pip
  PIP_EXTRA_INDEX_URL: https://dl.espressif.com/pypi
  PYTHON_IMAGE_MIN: python:3.10-bookworm
  PYTHON_IMAGE_LATEST: python:3.14-trixie
  CANARY_IMAGE: ubuntu:24.04
cache:
  paths: [$CI_PROJECT_DIR/.cache/pip]

# Shared by host_tests_windows and target_tests_windows (see host_tests.yml / target_tests.yml)
.windows_test:
  stage: test
  tags: [windows-target]
  variables:
    PYTHONPATH: "$PYTHONPATH:${CI_PROJECT_DIR}/test"
    COVERAGE_PROCESS_START: "${CI_PROJECT_DIR}/test/.covconf"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success
  before_script:
    - pip install -e .[dev] --prefer-binary
  artifacts:
    reports:
      junit: test/report.xml
    when: always
    paths:
      - test/*.out
      - "**/.coverage*"
      - ".coverage*"
    expire_in: 1 week

run_pre_commit_hooks:
  image: $PYTHON_IMAGE_LATEST
  stage: pre-check
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success
  tags: [host_test]
  before_script:
    - pip install --upgrade pip
  script:
    - pip install -e .[dev] --prefer-binary
    - pre-commit run --all-files
combine_reports:
  image: $PYTHON_IMAGE_MIN
  stage: report
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: never
    - when: on_success
  tags: [host_test]
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: cobertura_report.xml
    when: always
    paths: [.coverage*, cobertura_report.xml, ./html_report/]
    expire_in: 1 week
  coverage: /(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/
  variables:
    LC_ALL: C.UTF-8
    COVERAGE_RCFILE: ${CI_PROJECT_DIR}/test/.covconf
  before_script: ['pip install -e .[dev] --prefer-binary']
  script:
    # all .coverage files in sub-directories are moved to the parent dir first
    - find . -mindepth 2 -type f -name ".coverage*" -print -exec mv --backup=numbered
      {} . \;
    - coverage combine
    - coverage report --precision=2
    - coverage html -d html_report --precision=2
    - coverage xml -o cobertura_report.xml
