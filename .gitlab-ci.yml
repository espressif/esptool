combine_reports:
  stage: report
  image: python:3.10-bullseye
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $STUB_CANARY == "1"'
      when: never
    - when: on_success
  tags:
    - host_test
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: cobertura_report.xml
    when: always
    paths:
      - ".coverage*"
      - cobertura_report.xml
      - ./html_report/
    expire_in: 1 week
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  variables:
    LC_ALL: C.UTF-8
    COVERAGE_RCFILE: "${CI_PROJECT_DIR}/test/.covconf"
  before_script:
    - pip install -e .[dev] --prefer-binary
  script:
    # all .coverage files in sub-directories are moved to the parent dir first
    - find . -mindepth 2 -type f -name ".coverage*" -print -exec mv --backup=numbered {} . \;
    - coverage combine
    - coverage report --precision=2
    - coverage html -d html_report --precision=2
    - coverage xml -o cobertura_report.xml

build_docs:
  stage: build_docs
  image: python:3.14-trixie
  tags:
    - build_docs
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $STUB_CANARY == "1"'
      when: never
    - changes:
      - "docs/**/*"
      - "CONTRIBUTING.rst"
      - "esptool/cmds.py"
  needs: []
  artifacts:
    when: always
    paths:
      - docs/_build/*/*/*.txt
      - docs/_build/*/*/html/*
    expire_in: 4 days
  script:
    - pip install ".[docs]" --prefer-binary  # esptool is needed for the automatic API documentation generation
    - cd docs
    - build-docs -l en -t {esp8266,esp32,esp32s2,esp32c3,esp32s3,esp32c2,esp32c6,esp32h2,esp32p4,esp32c5,esp32c61,esp32h21,esp32h4}

.deploy_docs_template:
  stage: deploy_docs
  image: python:3.14-trixie
  tags:
    - deploy
  needs:
    - build_docs
  script:
    - source ${CI_PROJECT_DIR}/docs/utils.sh
    - add_doc_server_ssh_keys $DOCS_DEPLOY_PRIVATEKEY $DOCS_DEPLOY_SERVER $DOCS_DEPLOY_SERVER_USER
    - export GIT_VER=$(git describe --always)
    - pip install ".[docs]" --prefer-binary
    - deploy-docs

deploy_docs_preview:
  extends:
    - .deploy_docs_template
  rules:
    - if: $CI_COMMIT_REF_NAME == "master"
      when: never
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $STUB_CANARY == "1"'
      when: never
    - changes:
      - "docs/**/*"
      - "CONTRIBUTING.rst"
      - "esptool/cmds.py"
  variables:
    TYPE: "preview"
    DOCS_BUILD_DIR: "${CI_PROJECT_DIR}/docs/_build/"
    DOCS_DEPLOY_PRIVATEKEY: "$DOCS_PREVIEW_DEPLOY_KEY"
    DOCS_DEPLOY_SERVER: "$DOCS_PREVIEW_SERVER"
    DOCS_DEPLOY_SERVER_USER: "$DOCS_PREVIEW_SERVER_USER"
    DOCS_DEPLOY_PATH: "$DOCS_PREVIEW_PATH"
    DOCS_DEPLOY_URL_BASE: "$DOCS_PREVIEW_URL_BASE"

deploy_docs_production:
  extends:
    - .deploy_docs_template
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $STUB_CANARY == "1"'
      when: never
    - if: $CI_COMMIT_REF_NAME == "master"
      changes:
      - "docs/**/*"
      - "CONTRIBUTING.rst"
      - "esptool/cmds.py"
  variables:
    TYPE: "production"
    DOCS_BUILD_DIR: "${CI_PROJECT_DIR}/docs/_build/"
    DOCS_DEPLOY_PRIVATEKEY: "$DOCS_PROD_DEPLOY_KEY"
    DOCS_DEPLOY_SERVER: "$DOCS_PROD_SERVER"
    DOCS_DEPLOY_SERVER_USER: "$DOCS_PROD_SERVER_USER"
    DOCS_DEPLOY_PATH: "$DOCS_PROD_PATH"
    DOCS_DEPLOY_URL_BASE: "https://docs.espressif.com/projects/esptool"

build_internal_sdist:
  stage: deploy_development_package
  image: python:3.14-trixie
  tags:
    - host_test
  rules:
    - if: '$CI_COMMIT_BRANCH == "internal/dev_release" && $CI_PIPELINE_SOURCE == "push"'
  before_script:
    - pip install --upgrade pip build commitizen czespressif
  script:
    - BASE=$(cz bump --get-next)
    - SHORT_SHA=$(git rev-parse --short HEAD)
    - VERSION="${BASE}.dev${CI_PIPELINE_IID}+preview.${SHORT_SHA}"
    - echo "VERSION=${VERSION}" | tee build.env
    - sed -i "s/^__version__ = .*/__version__ = \"${VERSION}\"/" esptool/__init__.py
    - python -m build --sdist
  artifacts:
    paths:
      - dist/*.tar.gz
    reports:
      dotenv: build.env
    expire_in: 7 days

publish_internal_sdist:
  stage: deploy_development_package
  image: python:3.14-trixie
  tags:
    - host_test
  needs:
    - job: build_internal_sdist
      artifacts: true                                                 # pulls in dist/*.tar.gz + VERSION
  rules:
    - if: '$CI_COMMIT_BRANCH == "internal/dev_release" && $CI_PIPELINE_SOURCE == "push"'
      when: manual
      allow_failure: false
  before_script:
    - pip install --upgrade pip twine
  script:
    - >
      TWINE_USERNAME=gitlab-ci-token
      TWINE_PASSWORD=${CI_JOB_TOKEN}
      twine upload
      --repository-url ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/pypi
      dist/*.tar.gz

verify_internal_sdist:
  stage: deploy_development_package
  image: python:3.14-trixie
  tags:
    - host_test
  needs:
    - job: publish_internal_sdist
      artifacts: false
    - job: build_internal_sdist
      artifacts: true                                                 # pulls VERSION via dotenv
  rules:
    - if: '$CI_COMMIT_BRANCH == "internal/dev_release" && $CI_PIPELINE_SOURCE == "push"'
  script:
    - python -m venv /tmp/verify
    - /tmp/verify/bin/pip install --upgrade pip
    - >
      /tmp/verify/bin/pip install
      --pre
      --index-url "https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}:${CI_SERVER_PORT}/api/v4/projects/${CI_PROJECT_ID}/packages/pypi/simple/"
      --extra-index-url https://pypi.org/simple/
      "esptool==${VERSION}"                                           # inherited from build via dotenv
    # Assert `esptool version` prints the dev release ID (base + .dev<pipeline-iid> + +preview.<sha>).
    # The grep -Fx forces an exact-line match; -F treats the version string as a literal,
    # not a regex (the local-version segment contains `.` and `+` which are regex metacharacters).
    - /tmp/verify/bin/esptool version | grep -Fx "esptool v${VERSION}"

# ---------------------------------------------------------------------------
# Canary pipeline — runs only when $CI_PIPELINE_SOURCE == "schedule" &&
# $STUB_CANARY == "1". Checks whether the latest esp-stub-lib master is
# compatible with esptool by building fresh v2 stubs and running the full
# test suite against them.
#
# Attribution scope: the canary tracks esp-stub-lib only. esp-flasher-stub is
# rebuilt from its current master on every run; if a failure is caused by
# esp-flasher-stub drift rather than esp-stub-lib, the issue title will still
# blame esp-stub-lib. This is accepted because the canary only runs nightly,
# both SHAs are recorded in the issue body, and esp-flasher-stub is maintained
# by the same team as esptool.
#
# Quiet-night behaviour: when LAST_TESTED_STUB_LIB_SHA is unchanged,
# canary_poll calls the GitLab API to cancel the running pipeline
# (POST /projects/:id/pipelines/:id/cancel). canary_prep is the first stage
# and every other canary/test job depends on canary_poll directly or
# transitively, so the cancel propagates before any downstream job is
# dispatched to a runner — no extra Docker images are pulled. The pipeline
# ends in state 'canceled'; canary_on_failure (when: on_failure) does not
# react to a cancel, so no spurious issues are opened. canary_record does
# not run on quiet nights, which is correct — there is no new stub-lib SHA
# to record.
# ---------------------------------------------------------------------------
# Required CI/CD variables for the canary pipeline
# (set under Settings → CI/CD → Variables unless noted):
#   - STUB_CANARY=1            (set on the nightly schedule, not project-wide)
#   - LAST_TESTED_STUB_LIB_SHA (auto-created by canary_record on first success)
#   - GITLAB_API_TOKEN         (scope: api; role: Maintainer or higher —
#                               used by canary_poll to cancel the pipeline on
#                               no-op nights, and by canary_record to write
#                               project variables)
#   - MAINTAINERS              (optional, space-separated GitLab usernames;
#                               if unset, issues are opened unassigned)

canary_poll:
  stage: canary_prep
  image: alpine:3.23
  tags:
    - host_test
  <<: *canary_only
  retry: 2
  variables:
    ESP_STUB_LIB_REPO: "https://github.com/espressif/esp-stub-lib"
  script:
    - apk add --no-cache git curl
    # Preflight GITLAB_API_TOKEN in the earliest canary job so a missing or
    # expired token surfaces on day one, not weeks later when the first real
    # regression silently fails to open an issue in canary_on_failure.
    - |
      HTTP=$(curl --silent --output /dev/null --write-out "%{http_code}" \
        -H "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables?per_page=1")
      case "$HTTP" in
        200) echo "GITLAB_API_TOKEN preflight OK (api scope + Maintainer+ role)" ;;
        401) echo "ERROR: GITLAB_API_TOKEN invalid or expired"; exit 1 ;;
        403) echo "ERROR: GITLAB_API_TOKEN lacks Maintainer role on project (or 'api' scope)"; exit 1 ;;
        *)   echo "ERROR: unexpected HTTP $HTTP from preflight"; exit 1 ;;
      esac
    - SHA_NEW=$(git ls-remote "$ESP_STUB_LIB_REPO" HEAD | awk '{print $1}')
    - '[ -n "$SHA_NEW" ] || { echo "Failed to resolve esp-stub-lib HEAD"; exit 1; }'
    - echo "STUB_LIB_SHA=$SHA_NEW" > canary.env
    - |
      if [ "$SHA_NEW" = "$LAST_TESTED_STUB_LIB_SHA" ]; then
        echo "No new esp-stub-lib commits since $LAST_TESTED_STUB_LIB_SHA — cancelling pipeline."
        CANCEL_CODE=$(curl --silent --output /tmp/cancel.json --write-out "%{http_code}" \
          --request POST \
          --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/pipelines/$CI_PIPELINE_ID/cancel")
        if [ "$CANCEL_CODE" != "200" ]; then
          echo "ERROR: pipeline cancel returned HTTP $CANCEL_CODE"
          cat /tmp/cancel.json || true
          exit 1
        fi
        # Block until the runner receives SIGTERM from the cancel — keeps
        # canary_poll from completing successfully and letting the rest of
        # the DAG dispatch in the brief window before the cancel propagates.
        # Cancel typically arrives in seconds; the 5-minute upper bound is a
        # safety net so a stuck cancel exits clean instead of opening a
        # canary_on_failure issue.
        echo "Cancel API call accepted; waiting for runner SIGTERM."
        sleep 300
        echo "WARNING: cancel did not propagate within 5 minutes — exiting clean."
        exit 0
      fi
  artifacts:
    reports:
      dotenv: canary.env

canary_build_stubs:
  stage: canary_prep
  image: ubuntu:24.04
  tags:
    - host_test
  needs: [canary_poll]
  <<: *canary_only
  retry: 2
  variables:
    FLASHER_STUB_REPO: "https://github.com/espressif/esp-flasher-stub.git"
  before_script:
    - apt-get update
    - apt-get install -y git python3 python3-pyelftools wget xz-utils build-essential cmake ninja-build
  script:
    - echo "CANARY_PHASE=build" > canary_build.env
    # esp-flasher-stub is taken from master each run — the attribution caveat is documented at the top of the canary block.
    - git clone --depth 1 --recurse-submodules "$FLASHER_STUB_REPO" esp-flasher-stub
    - git -C esp-flasher-stub rev-parse HEAD | awk '{print "FLASHER_STUB_SHA=" $1}' >> canary_build.env
    - cd esp-flasher-stub/esp-stub-lib
    # Relies on GitHub's uploadpack.allowAnySHA1InWant = true to fetch an arbitrary commit SHA without needing its ref.
    - git fetch --depth 1 origin "$STUB_LIB_SHA"
    - git checkout "$STUB_LIB_SHA"
    - cd ..
    - mkdir -p toolchains && pushd toolchains && ../tools/setup_toolchains.sh && popd
    - source ./tools/export_toolchains.sh
    - ./tools/build_all_chips.sh
  artifacts:
    when: always
    paths:
      - "esp-flasher-stub/build*/esp*.json"
    exclude:
      - "esp-flasher-stub/build*/*.base.json"
    expire_in: 1 week
    reports:
      dotenv: canary_build.env

canary_patch:
  stage: canary_prep
  image: alpine:3.23
  tags:
    - host_test
  needs: [canary_build_stubs]
  <<: *canary_only
  before_script:
    - apk add --no-cache git
  script:
    # Delete committed stubs first so missing artifacts can't be masked
    - rm -f esptool/targets/stub_flasher/2/esp*.json
    - mkdir -p esptool/targets/stub_flasher/2
    # Collect every esp*.json built by canary_build_stubs — same exclude
    # filter as the artifact `exclude:` rule (*.base.json are linker-stage
    # intermediates, not shipped stubs).
    - |
      jsons=$(find esp-flasher-stub -maxdepth 2 -name 'esp*.json' \
                                    -not -name '*.base.json')
      if [ -z "$jsons" ]; then
        echo "ERROR: canary_build_stubs produced no stub artifacts"
        exit 1
      fi
      cp $jsons esptool/targets/stub_flasher/2/
    - count=$(ls esptool/targets/stub_flasher/2/esp*.json | wc -l)
    - echo "Copied $count stub artifact(s) from esp-flasher-stub into v2/"
    - ls -la esptool/targets/stub_flasher/2/
    - echo "=== Stub set diff against committed v2 stubs ==="
    - git diff --stat -- esptool/targets/stub_flasher/2/
    - echo "CANARY_PHASE=test" > canary_patch.env
  artifacts:
    when: on_success
    paths:
      - "esptool/targets/stub_flasher/2/*.json"
    expire_in: 1 week
    reports:
      dotenv: canary_patch.env

canary_record:
  stage: canary_post
  image: alpine:3.23
  tags:
    - host_test
  <<: *canary_only
  script:
    # Write CANARY_PHASE=record up front — before any potentially-failing
    # API call — so that if this job fails, canary_on_failure attributes
    # the failure to the record phase rather than re-using the
    # CANARY_PHASE=test value that canary_patch propagated.
    - echo "CANARY_PHASE=record" > canary_record.env
    - |
      if [ -z "$GITLAB_API_TOKEN" ]; then
        echo "ERROR: GITLAB_API_TOKEN is not available in this pipeline."
        echo "       The variable is likely marked 'Protected' in GitLab CI/CD"
        echo "       Variables and this pipeline is running on an unprotected"
        echo "       branch ($CI_COMMIT_REF_NAME). LAST_TESTED_STUB_LIB_SHA"
        echo "       cannot be recorded."
        exit 1
      fi
    - apk add --no-cache curl
    - |
      HTTP_CODE=$(curl --silent --output /tmp/resp.json --write-out "%{http_code}" \
        --request POST \
        --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
        --data-urlencode "key=LAST_TESTED_STUB_LIB_SHA" \
        --data-urlencode "value=$STUB_LIB_SHA" \
        "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables")
      if [ "$HTTP_CODE" = "201" ]; then
        echo "Created LAST_TESTED_STUB_LIB_SHA=$STUB_LIB_SHA"
      elif [ "$HTTP_CODE" = "400" ] && grep -q "has already been taken" /tmp/resp.json; then
        echo "Variable already exists — updating via PUT"
        PUT_CODE=$(curl --silent --output /tmp/put_resp.json --write-out "%{http_code}" \
          --request PUT \
          --header "PRIVATE-TOKEN: $GITLAB_API_TOKEN" \
          --data-urlencode "value=$STUB_LIB_SHA" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/variables/LAST_TESTED_STUB_LIB_SHA")
        if [ "$PUT_CODE" != "200" ]; then
          echo "PUT /variables/LAST_TESTED_STUB_LIB_SHA failed: HTTP $PUT_CODE"
          cat /tmp/put_resp.json || true
          exit 1
        fi
        echo "Updated LAST_TESTED_STUB_LIB_SHA=$STUB_LIB_SHA"
      else
        echo "Unexpected response from POST variables: HTTP $HTTP_CODE"
        cat /tmp/resp.json || true
        exit 1
      fi
  artifacts:
    reports:
      dotenv: canary_record.env

canary_on_failure:
  stage: canary_post
  image: python:3.14-slim-trixie
  tags:
    - host_test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $STUB_CANARY == "1"'
      when: on_failure
  # All needs are optional so that this job fires even when an upstream job
  # itself fails (a non-optional failed need would cause GitLab to skip this
  # job, silencing the failure report). When canary_poll fails, dotenv vars
  # are not propagated and STUB_LIB_SHA defaults to "unknown" in the script;
  # that is acceptable — the issue body still contains the pipeline URL for
  # investigation. canary_record is listed here (in the same stage) so that
  # its failure triggers when: on_failure — a same-stage failure alone does
  # not, but a failed need does.
  needs:
    - job: canary_poll
      artifacts: true
      optional: true
    - job: canary_build_stubs
      artifacts: true
      optional: true
    - job: canary_patch
      artifacts: true
      optional: true
    - job: canary_record
      artifacts: true
      optional: true
  script:
    - python ci/canary_open_issue.py
